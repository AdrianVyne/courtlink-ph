name: courtlink-ph

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: courtlink
      POSTGRES_USER: courtlink
      POSTGRES_PASSWORD: courtlink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtlink -d courtlink"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.3-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: courtlink
      MINIO_ROOT_PASSWORD: courtlink-dev-secret
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:

